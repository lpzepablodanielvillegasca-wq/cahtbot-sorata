<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Asistente Sorata AI</title>

<style>

body{
font-family:Arial;
}

#chat{
position:fixed;
right:20px;
bottom:20px;
width:360px;
background:white;
border-radius:15px;
box-shadow:0 0 15px gray;
overflow:hidden;
}

#titulo{
background:#087f5b;
color:white;
padding:15px;
font-weight:bold;
}

#mensajes{
height:400px;
overflow:auto;
padding:10px;
}

.bot{
background:#eeeeee;
padding:10px;
margin:8px;
border-radius:10px;
}

.usuario{
background:#d9f2ff;
padding:10px;
margin:8px;
border-radius:10px;
text-align:right;
}


#zona{
display:flex;
}

input{
width:80%;
padding:12px;
border:none;
outline:none;
}

button{
width:20%;
background:#087f5b;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>


<body>


<div id="chat">


<div id="titulo">
🌄 Asistente Turístico Sorata AI
</div>


<div id="mensajes">

<div class="bot">
Hola 👋 Soy la inteligencia artificial turística de Sorata.
Pregúntame sobre lugares, tours, viajes o reservas.
</div>

</div>


<div id="zona">

<input id="texto" placeholder="Escribe tu pregunta">

<button onclick="enviar()">➤</button>

</div>


</div>



<script>


const API_KEY="AQ.Ab8RN6LhaEoV3SvujqSekSYVxzrQYo1dXpD1lrW7EclK2XjwRw";



async function enviar(){


let input=document.getElementById("texto");

let pregunta=input.value;


if(!pregunta)return;



let caja=document.getElementById("mensajes");


caja.innerHTML += 
`<div class="usuario">${pregunta}</div>`;


input.value="";


caja.innerHTML +=
`<div class="bot" id="cargando">Pensando 🤖...</div>`;



try{


let respuesta = await fetch(

"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,


{

method:"POST",

headers:{
"Content-Type":"application/json"
},


body:JSON.stringify({

contents:[

{

parts:[

{

text:

`
Eres el asistente turístico oficial de Sorata Bolivia.

Responde siempre en español.

Ayuda con:
- atractivos turísticos
- tours
- reservas
- transporte
- requisitos de viaje
- recomendaciones

Si el usuario quiere reservar un tour, dile que contacte al asesor por WhatsApp.

Si no sabes algo responde:
"No tengo esa información disponible. Por favor contacta con nuestro asesor turístico."

Pregunta del usuario:
${pregunta}

`

}

]

}

]

})

}


);



let data=await respuesta.json();


document.getElementById("cargando").remove();



let textoRespuesta =
data.candidates[0].content.parts[0].text;



caja.innerHTML +=
`<div class="bot">${textoRespuesta}</div>`;


caja.scrollTop=caja.scrollHeight;



}catch(error){


document.getElementById("cargando").innerHTML =
"❌ Error de conexión. Contacta con un asesor.";


}



}


</script>


</body>
</html>
